name: Test

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - "**/*.md"

env:
  CARGO_TERM_COLOR: always

# Finishing a warm build beats canceling mid-Lance and paying for a cold rebuild.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test Suite
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4

    - name: Persistent cargo target (self-hosted)
      run: |
        set -euo pipefail
        dir="${HOME}/.cache/rms-ci/rms-memory-mcp/target"
        mkdir -p "$dir"
        echo "CARGO_TARGET_DIR=$dir" >> "$GITHUB_ENV"
        echo "Using CARGO_TARGET_DIR=$dir"

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Run Tests
      run: cargo test --verbose

    - name: Record grammar dependency graph
      run: cargo tree -i tree-sitter
