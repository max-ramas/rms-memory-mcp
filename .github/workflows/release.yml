name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_crates:
        description: Publish the package to crates.io after successful builds
        required: false
        default: false
        type: boolean
      expected_version:
        description: Package version to publish for a manual run (for example 1.0.5)
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Unix / Windows
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            cargo build --release --target ${{ matrix.target }}
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/rms-memory target/release/
          else
            cargo build --release
          fi
        shell: bash

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
        shell: bash

      - name: Generate DEB & RPM (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo deb --no-build
          cargo generate-rpm
        shell: bash



      - name: Strip Binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/release/rms-memory



      - name: Package (Unix / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/release/rms-memory staging/rms-memory

          # Copy deb and rpm to staging if Linux
          if [ "${{ runner.os }}" == "Linux" ]; then
            cp target/debian/*.deb staging/ || true
            cp target/generate-rpm/*.rpm staging/ || true
          fi

          cd staging
          tar -czf ../rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }} rms-memory
          if [ "${{ runner.os }}" == "Linux" ]; then
            mv *.deb ../ || true
            mv *.rpm ../ || true
          fi
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          cp target\release\rms-memory.exe staging\rms-memory.exe
          cd staging
          Compress-Archive -Path rms-memory.exe -DestinationPath ..\rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }}
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rms-memory-${{ matrix.target }}
          path: |
            rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }}
            *.deb
            *.rpm
          retention-days: 1

  release:
    name: Create GitHub Release
    # Binary release is independent from crates.io publication. A registry
    # verification failure must not hide successfully built release assets.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh api repos/max-ramas/homebrew-tap/dispatches \
            -f event_type=new-release \
            -f "client_payload[repo]=max-ramas/rms-memory-mcp" \
            -f "client_payload[formula]=rms-memory-mcp" \
            -f "client_payload[bin_name]=rms-memory-mcp" \
            -f "client_payload[tag]=${{ github.ref_name }}"

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Tags publish automatically. A manual dispatch must opt in explicitly and
    # name the exact package version it expects to release.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_crates == true
    environment: crates.io
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify requested version
        env:
          EXPECTED_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.expected_version }}
        run: |
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rms-memory-mcp") | .version')"
          expected_version="${EXPECTED_VERSION#v}"
          test -n "$expected_version"
          test "$package_version" = "$expected_version"

      - name: Publish package
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
