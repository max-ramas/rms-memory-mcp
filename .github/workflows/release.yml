name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which targets to build (saves GH macOS/Windows minutes). Tag pushes always build all."
        required: false
        default: all
        type: choice
        options:
          - all
          - linux-x64
          - linux-arm
          - linux
          - macos
          - windows
      publish_crates:
        description: Publish the package to crates.io after successful builds
        required: false
        default: false
        type: boolean
      expected_version:
        description: Package version to publish for a manual run (for example 1.0.6)
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: [self-hosted, linux, x64]
    outputs:
      include: ${{ steps.select.outputs.include }}
    steps:
      - name: Select platforms
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          PLATFORMS: ${{ inputs.platforms || 'all' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          all_rows = [
            {
              "id": "linux-x64",
              "os": ["self-hosted", "linux", "x64"],
              "target": "x86_64-unknown-linux-gnu",
              "archive_ext": "tar.gz",
              "use_cross": False,
              "apt": False,
              "persist_target": True,
            },
            {
              "id": "linux-arm",
              "os": "ubuntu-24.04-arm",
              "target": "aarch64-unknown-linux-gnu",
              "archive_ext": "tar.gz",
              "use_cross": False,
              "apt": True,
              "persist_target": False,
            },
            {
              "id": "macos",
              "os": "macos-latest",
              "target": "aarch64-apple-darwin",
              "archive_ext": "tar.gz",
              "use_cross": False,
              "apt": False,
              "persist_target": False,
            },
            {
              "id": "windows",
              "os": "windows-latest",
              "target": "x86_64-pc-windows-msvc",
              "archive_ext": "zip",
              "use_cross": False,
              "apt": False,
              "persist_target": False,
            },
          ]
          event = os.environ["EVENT_NAME"]
          platforms = os.environ.get("PLATFORMS") or "all"
          if event == "push" or platforms == "all":
            selected = all_rows
          elif platforms == "linux":
            selected = [r for r in all_rows if r["id"].startswith("linux")]
          else:
            wanted = {p.strip() for p in platforms.split(",") if p.strip()}
            selected = [r for r in all_rows if r["id"] in wanted]
          if not selected:
            raise SystemExit(f"no platforms matched: {platforms!r}")
          print("Selected:", ", ".join(r["id"] for r in selected))
          include = json.dumps(selected)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"include={include}\n")
          PY

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.include) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Persistent cargo target (self-hosted)
        if: matrix.persist_target == true
        run: |
          set -euo pipefail
          dir="${HOME}/.cache/rms-ci/rms-memory-mcp-release/target"
          mkdir -p "$dir"
          echo "CARGO_TARGET_DIR=$dir" >> "$GITHUB_ENV"
          echo "Using CARGO_TARGET_DIR=$dir"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install System Dependencies (GitHub-hosted Linux)
        # Self-hosted has no passwordless sudo; deps are preinstalled on the host.
        if: runner.os == 'Linux' && matrix.apt == true
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Verify System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          command -v pkg-config
          pkg-config --exists openssl
          echo "openssl $(pkg-config --modversion openssl)"

      - name: Restore Rust registry cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mcp-release-${{ matrix.target }}
          cache-targets: false

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Unix / Windows
        run: |
          set -euo pipefail
          TD="${CARGO_TARGET_DIR:-target}"
          if [ "${{ runner.os }}" == "macOS" ]; then
            cargo build --release --target ${{ matrix.target }}
            mkdir -p "$TD/release"
            cp "$TD/${{ matrix.target }}/release/rms-memory" "$TD/release/"
          else
            cargo build --release
          fi
        shell: bash

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
        shell: bash

      - name: Generate DEB & RPM (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo deb --no-build
          cargo generate-rpm
        shell: bash

      - name: Strip Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          TD="${CARGO_TARGET_DIR:-target}"
          strip "$TD/release/rms-memory"

      - name: Package (Unix / macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          TD="${CARGO_TARGET_DIR:-target}"
          mkdir -p staging
          cp "$TD/release/rms-memory" staging/rms-memory

          if [ "${{ runner.os }}" == "Linux" ]; then
            cp "$TD/debian"/*.deb staging/ 2>/dev/null || cp target/debian/*.deb staging/ || true
            cp "$TD/generate-rpm"/*.rpm staging/ 2>/dev/null || cp target/generate-rpm/*.rpm staging/ || true
          fi

          cd staging
          tar -czf ../rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }} rms-memory
          if [ "${{ runner.os }}" == "Linux" ]; then
            mv *.deb ../ 2>/dev/null || true
            mv *.rpm ../ 2>/dev/null || true
          fi
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          cp target\release\rms-memory.exe staging\rms-memory.exe
          cd staging
          Compress-Archive -Path rms-memory.exe -DestinationPath ..\rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }}
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rms-memory-${{ matrix.target }}
          path: |
            rms-memory-${{ matrix.target }}.${{ matrix.archive_ext }}
            *.deb
            *.rpm
          retention-days: 1

  release:
    name: Create GitHub Release
    # Binary release is independent from crates.io publication. A registry
    # verification failure must not hide successfully built release assets.
    needs: build
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh api repos/max-ramas/homebrew-tap/dispatches \
            -f event_type=new-release \
            -f "client_payload[repo]=max-ramas/rms-memory-mcp" \
            -f "client_payload[formula]=rms-memory-mcp" \
            -f "client_payload[bin_name]=rms-memory-mcp" \
            -f "client_payload[tag]=${{ github.ref_name }}"

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: [self-hosted, linux, x64]
    # Tags publish automatically. A manual dispatch must opt in explicitly and
    # name the exact package version it expects to release.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_crates == true
    environment: crates.io
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify requested version
        env:
          EXPECTED_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.expected_version }}
        run: |
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rms-memory-mcp") | .version')"
          expected_version="${EXPECTED_VERSION#v}"
          test -n "$expected_version"
          test "$package_version" = "$expected_version"

      - name: Publish package
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
